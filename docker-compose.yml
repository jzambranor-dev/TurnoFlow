version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: turnoflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: turnoflow
      POSTGRES_USER: turnoflow
      POSTGRES_PASSWORD: turnoflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnoflow -d turnoflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
